<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todo List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap');
    :root {
      --bg: #0b1021;
      --panel: #11162b;
      --accent: #6ce5b1;
      --text: #e8ecf3;
      --muted: #9aa3b5;
      --border: #1e2743;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 20%, rgba(108,229,177,0.08), transparent 30%),
                  radial-gradient(circle at 80% 0%, rgba(108,229,177,0.1), transparent 30%),
                  var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 32px 18px 48px;
      display: flex;
      justify-content: center;
    }
    .shell {
      width: min(960px, 100%);
      background: linear-gradient(145deg, var(--panel), #0c1224);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 22px 30px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }
    header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; }
    h1 { font-size: 24px; margin: 0; letter-spacing: -0.4px; }
    .pill { color: var(--muted); font-size: 13px; }
    form#addForm { display: grid; grid-template-columns: 1fr 180px 120px; gap: 10px; margin-bottom: 18px; align-items: end; }
    input, button { font-family: inherit; border-radius: 10px; border: 1px solid var(--border); background: #0f162b; color: var(--text); padding: 10px 12px; }
    input:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    button { cursor: pointer; border-color: var(--accent); background: linear-gradient(135deg, var(--accent), #4cd6a6); color: #0c1224; font-weight: 600; }
    button.secondary { background: transparent; color: var(--text); border-color: var(--border); }
    .tasks { display: grid; gap: 10px; }
    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: rgba(17,22,43,0.9);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .title { font-weight: 600; }
    .muted { color: var(--muted); font-size: 13px; }
    .actions { display: flex; gap: 8px; }
    .badge { padding: 4px 8px; border-radius: 8px; background: rgba(108,229,177,0.14); color: var(--accent); font-size: 12px; }
    .reminder { color: #f7d774; font-size: 13px; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .hidden { display: none; }
    @media (max-width: 720px) {
      form#addForm { grid-template-columns: 1fr; }
      .card { grid-template-columns: 1fr; align-items: flex-start; }
      .actions { justify-content: flex-start; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Todo List</h1>
      <div class="pill">API-powered • local JSON storage</div>
    </header>

    <form id="addForm">
      <div>
        <label class="visually-hidden" for="titleInput">Task title</label>
        <input id="titleInput" type="text" placeholder="New task..." required />
      </div>
      <div>
        <label class="visually-hidden" for="reminderInput">Reminder</label>
        <input id="reminderInput" type="datetime-local" placeholder="Reminder" />
      </div>
      <button type="submit">Add task</button>
    </form>

    <div id="emptyState" class="muted hidden">No tasks yet. Add one above.</div>
    <div id="tasks" class="tasks"></div>
  </div>

  <script>
    const api = '/api/tasks';
    const tasksEl = document.getElementById('tasks');
    const emptyEl = document.getElementById('emptyState');
    const addForm = document.getElementById('addForm');
    const titleInput = document.getElementById('titleInput');
    const reminderInput = document.getElementById('reminderInput');

    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = titleInput.value.trim();
      if (!title) return;
      const reminder = reminderInput.value ? new Date(reminderInput.value).toISOString() : null;
      await fetch(api, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, reminderAtUtc: reminder })
      });
      titleInput.value = '';
      reminderInput.value = '';
      await loadTasks();
    });

    async function loadTasks() {
      const res = await fetch(api);
      const items = await res.json();
      render(items);
    }

    function render(items) {
      tasksEl.innerHTML = '';
      if (!items.length) {
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');
      items.sort((a,b) => a.id - b.id).forEach(task => {
        const card = document.createElement('div');
        card.className = 'card';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.isDone;
        checkbox.addEventListener('change', () => updateTask(task.id, { isDone: checkbox.checked }));

        const main = document.createElement('div');
        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = task.title;

        const meta = document.createElement('div');
        meta.className = 'muted';
        meta.textContent = `Created ${formatLocal(task.createdAt)}`;

        const reminder = document.createElement('div');
        if (task.reminderAtUtc) {
          reminder.className = 'reminder';
          reminder.textContent = `Reminder: ${formatLocal(task.reminderAtUtc)}`;
        }

        main.appendChild(title);
        main.appendChild(meta);
        if (task.reminderAtUtc) main.appendChild(reminder);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'secondary';
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', () => editTask(task));

        const reminderBtn = document.createElement('button');
        reminderBtn.className = 'secondary';
        reminderBtn.textContent = task.reminderAtUtc ? 'Clear reminder' : 'Set reminder';
        reminderBtn.addEventListener('click', () => changeReminder(task));

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'secondary';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteTask(task.id));

        actions.append(editBtn, reminderBtn, deleteBtn);

        card.append(checkbox, main, actions);
        tasksEl.appendChild(card);
      });
    }

    async function editTask(task) {
      const title = prompt('New title (leave blank to keep current):', task.title);
      if (title === null) return;
      const payload = {};
      if (title.trim()) payload.title = title.trim();
      await updateTask(task.id, payload);
    }

    async function changeReminder(task) {
      const current = task.reminderAtUtc ? formatLocal(task.reminderAtUtc, true) : '';
      const input = prompt('Set reminder (local time, yyyy-MM-ddTHH:mm). Leave blank to clear.', current);
      if (input === null) return;
      if (input === '') {
        await updateTask(task.id, { clearReminder: true });
        return;
      }
      const dt = new Date(input);
      if (isNaN(dt.getTime())) {
        alert('Could not parse that time.');
        return;
      }
      await updateTask(task.id, { reminderAtUtc: dt.toISOString(), clearReminder: false });
    }

    async function updateTask(id, payload) {
      await fetch(`${api}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      await loadTasks();
    }

    async function deleteTask(id) {
      const ok = confirm('Delete this task?');
      if (!ok) return;
      await fetch(`${api}/${id}`, { method: 'DELETE' });
      await loadTasks();
    }

    function formatLocal(iso, short = false) {
      const d = new Date(iso);
      const options = short
        ? { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }
        : { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      return d.toLocaleString(undefined, options);
    }

    loadTasks();
  </script>
</body>
</html>
